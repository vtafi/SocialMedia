name: Deploy Production

on:
  push:
    branches:
      - deploy

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./NodeJS-TS
          file: ./NodeJS-TS/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/twitter:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "NodeJS-TS/docker-compose.yml"
          target: "~/NodeJS-TS"
          strip_components: 1

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
         script: |
            mkdir -p ~/NodeJS-TS
            cd ~/NodeJS-TS
            
            # 1. Tạo file .env từ secret
            echo "${{ secrets.ENV_FILE_CONTENT }}" > .env
            
            # 2. Đảm bảo network proxy tồn tại (tránh lỗi nếu chưa tạo)
            docker network inspect proxy-network >/dev/null 2>&1 || docker network create proxy-network
            
            # 3. Pull image mới nhất
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/twitter:latest
            
            # 4. Triển khai (Dùng --env-file để ép đọc biến môi trường từ file vừa tạo)
            docker-compose --env-file .env up -d --no-deps backend
            
            # 5. Dọn dẹp
            docker image prune -f
